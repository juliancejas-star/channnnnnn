<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="referrer" content="no-referrer">
<title>CVA TV</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0d14;
  --surface: #0f1520;
  --surface2: #161e30;
  --border: #1c2840;
  --accent: #e8312a;
  --accent2: #ff6b63;
  --text: #e8edf5;
  --muted: #5a6a85;
  --card-hover: #172035;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;}
#app{display:flex;flex-direction:column;height:100vh;}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px;color:#fff;}
.logo span{color:var(--accent);}
.live-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

/* Main */
main{display:flex;flex:1;overflow:hidden;}

/* Sidebar */
#sidebar{width:255px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.search-wrap{padding:10px 12px;border-bottom:1px solid var(--border);}
#search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-size:13px;outline:none;font-family:'Barlow',sans-serif;transition:border-color .2s;}
#search:focus{border-color:var(--accent);}
#search::placeholder{color:var(--muted);}
.cat-tabs{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.cat-btn{padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:all .2s;font-family:'Barlow',sans-serif;}
.cat-btn:hover{color:var(--text);border-color:var(--accent);}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
#channel-list{overflow-y:auto;flex:1;}
#channel-list::-webkit-scrollbar{width:3px;}
#channel-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.ch-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid #0a1020;transition:background .15s;}
.ch-item:hover{background:var(--card-hover);}
.ch-item.active{background:#1a1030;border-left:3px solid var(--accent);}
.ch-num{font-size:11px;color:var(--muted);min-width:20px;font-family:'Barlow Condensed',sans-serif;}
.ch-icon{width:36px;height:36px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--accent2);flex-shrink:0;border:1px solid var(--border);text-align:center;line-height:1.2;padding:2px;}
.ch-name{font-size:13px;font-weight:500;color:var(--text);}
.ch-cat{font-size:10px;color:var(--muted);margin-top:1px;}

/* Content */
#content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#player-wrap{position:relative;background:#000;flex-shrink:0;}
#player{width:100%;aspect-ratio:16/9;}

/* JW overrides */
.jw-progress{background-color:var(--accent) !important;}
.jw-text-live::before{background-color:var(--accent) !important;}
.jw-controlbar{background:rgba(10,13,20,.95) !important;border-top:1px solid var(--border) !important;}
.jw-button-color{color:#6a7d9a !important;}
.jw-reset-text{color:#fff !important;}

/* Now playing */
#now-playing{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
#np-icon{width:42px;height:42px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent2);border:1px solid var(--border);text-align:center;padding:2px;flex-shrink:0;}
#np-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;line-height:1;}
#np-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.np-live{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-left:10px;}
.np-live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.4s infinite;}

/* Status */
#status-bar{padding:5px 20px;font-size:11px;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;min-height:26px;}
.spin{display:inline-block;animation:spinr .7s linear infinite;}
@keyframes spinr{to{transform:rotate(360deg)}}

/* Empty */
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px;}
#empty .big-icon{font-size:52px;opacity:.25;}
#empty p{font-size:14px;}

/* iOS landscape */
.ios-landscape{transform:rotate(90deg);transform-origin:center center;width:100vh !important;height:100vw !important;position:fixed !important;top:0;left:0;background:#000;z-index:9999;}

@media(max-width:640px){#sidebar{width:195px;}}
@media(max-width:480px){
  main{flex-direction:column;}
  #sidebar{width:100%;height:155px;border-right:none;border-bottom:1px solid var(--border);}
  #channel-list{display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden;}
  .ch-item{flex-direction:column;min-width:68px;text-align:center;padding:7px 5px;border-bottom:none;border-right:1px solid #0a1020;}
  .ch-num,.ch-cat{display:none;}
  .search-wrap,.cat-tabs{display:none;}
}
</style>
</head>

// Deduplicate
var seen = {};
CANALES = CANALES.filter(function(c){ if(seen[c.b64]) return false; seen[c.b64]=1; return true; });

var CATS = ["Todas","Deportes","Noticias","Abierta","Cine","HBO","Docs","Entret.","Infantil","Música","Adultos"];
var activeCat = "Todas", activeSearch = "", currentCh = null, playerInst = null;

function abbrev(n){ var w=n.split(" "); return w.length===1?n.substring(0,4).toUpperCase():w.slice(0,2).map(function(x){return x[0];}).join("").toUpperCase(); }

function renderCats(){
  var wrap=document.getElementById("cat-tabs"); wrap.innerHTML="";
  CATS.forEach(function(c){
    var b=document.createElement("button");
    b.className="cat-btn"+(c===activeCat?" active":"");
    b.textContent=c;
    b.onclick=function(){activeCat=c;renderCats();renderList();};
    wrap.appendChild(b);
  });
}

function renderList(){
  var list=document.getElementById("channel-list"); list.innerHTML="";
  var q=activeSearch.toLowerCase();
  var filtered=CANALES.filter(function(ch){
    return (activeCat==="Todas"||ch.cat===activeCat)&&(!q||ch.nombre.toLowerCase().includes(q));
  });
  filtered.forEach(function(ch,i){
    var el=document.createElement("div");
    el.className="ch-item"+(currentCh&&currentCh.b64===ch.b64?" active":"");
    el.innerHTML='<div class="ch-num">'+(i+1)+'</div><div class="ch-icon">'+abbrev(ch.nombre)+'</div><div><div class="ch-name">'+ch.nombre+'</div><div class="ch-cat">'+ch.cat+'</div></div>';
    el.onclick=function(){sintonizar(ch);};
    list.appendChild(el);
  });
}

document.getElementById("search").addEventListener("input",function(){activeSearch=this.value;renderList();});

function sintonizar(ch){
  currentCh=ch; renderList();
  document.getElementById("now-playing").style.display="flex";
  document.getElementById("np-icon").textContent=abbrev(ch.nombre);
  document.getElementById("np-name").textContent=ch.nombre;
  document.getElementById("empty").style.display="none";
  setStatus('<span class="spin">↻</span> Conectando con '+ch.nombre+'…');

  var host=rndHost();
  var canal=atob(ch.b64);
  var url="https://"+host+".cvattv.com.ar/live/c"+ch.n+"eds/"+canal+"/SA_Live_dash_enc_C/"+canal+".mpd";

  if(playerInst){try{playerInst.remove();}catch(e){}playerInst=null;}
  document.getElementById("player").innerHTML="";

  jwplayer("player").setup({
    playlist:[{
      title:ch.nombre, description:"EN VIVO",
      sources:[{ file:url, type:"dash", drm:{ clearkey:{ keyId:ch.k1, key:ch.k2 } } }]
    }],
    autostart:true, mute:false, volume:100,
    width:"100%", height:"100%", stretching:"exactfit", aspectratio:"16:9",
    preload:"auto", cast:{}, sharing:{}
  });

  playerInst=jwplayer("player");

  playerInst.on("play",function(){
    setStatus("▶ Reproduciendo · "+ch.nombre+" · "+host.toUpperCase());
    try{playerInst.setCurrentAudioTrack(1);}catch(e){}
  });
  playerInst.on("error",function(e){
    // fallback: try other host
    var altHost = host==="cdn"?"chromecast":"cdn";
    var altUrl = "https://"+altHost+".cvattv.com.ar/live/c"+ch.n+"eds/"+canal+"/SA_Live_dash_enc_C/"+canal+".mpd";
    setStatus('<span class="spin">↻</span> Reintentando con servidor alternativo…');
    try{
      playerInst.load([{sources:[{file:altUrl,type:"dash",drm:{clearkey:{keyId:ch.k1,key:ch.k2}}}]}]);
      playerInst.play();
    }catch(ex){ setStatus("✕ Error: no se pudo cargar "+ch.nombre); }
  });
  playerInst.on("buffer",function(){ setStatus('<span class="spin">↻</span> Cargando…'); });

  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  playerInst.on("fullscreen",function(e){
    var c=document.getElementById("player");
    if(!isIOS&&screen.orientation){
      if(e.fullscreen){(async function t(){try{await screen.orientation.lock("landscape");}catch(err){setTimeout(t,200);}})();}
      else{try{screen.orientation.unlock();}catch(err){}}
    }
    if(isIOS){if(e.fullscreen)c.classList.add("ios-landscape");else c.classList.remove("ios-landscape");}
  });
}

function setStatus(html){ document.getElementById("status-bar").innerHTML=html; }

renderCats(); renderList();
