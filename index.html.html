<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="referrer" content="no-referrer">
<title>GigaTV</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c18;
  --surface: #0e1424;
  --surface2: #141c30;
  --border: #1e2a44;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --live: #ef4444;
  --text: #e8edf5;
  --muted: #64748b;
  --card-hover: #1a2540;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;}

/* ── Layout ── */
#app { display:flex; flex-direction:column; height:100vh; }

/* ── Header ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; height:52px; flex-shrink:0;
  background:var(--surface); border-bottom:1px solid var(--border);
}
.logo { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; letter-spacing:1px; color:#fff; }
.logo span { color:var(--accent); }
.live-badge {
  display:flex; align-items:center; gap:6px;
  font-size:11px; font-weight:600; letter-spacing:.1em; color:var(--live);
  text-transform:uppercase;
}
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--live); animation:pulse 1.4s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

/* ── Main ── */
main { display:flex; flex:1; overflow:hidden; }

/* ── Sidebar ── */
#sidebar {
  width:260px; flex-shrink:0; background:var(--surface);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.search-wrap { padding:12px; border-bottom:1px solid var(--border); }
#search {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; padding:8px 12px; color:var(--text); font-size:13px;
  outline:none; font-family:'Barlow',sans-serif;
  transition:border-color .2s;
}
#search:focus { border-color:var(--accent); }
#search::placeholder { color:var(--muted); }

.cat-tabs {
  display:flex; gap:4px; padding:8px 12px;
  border-bottom:1px solid var(--border); flex-wrap:wrap;
}
.cat-btn {
  padding:4px 10px; border-radius:4px; border:1px solid var(--border);
  background:transparent; color:var(--muted); font-size:11px; font-weight:600;
  cursor:pointer; text-transform:uppercase; letter-spacing:.05em;
  transition:all .2s; font-family:'Barlow',sans-serif;
}
.cat-btn:hover { color:var(--text); border-color:var(--accent); }
.cat-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

#channel-list { overflow-y:auto; flex:1; }
#channel-list::-webkit-scrollbar { width:4px; }
#channel-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.ch-item {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  cursor:pointer; border-bottom:1px solid #0d1526;
  transition:background .15s;
}
.ch-item:hover { background:var(--card-hover); }
.ch-item.active { background:#162040; border-left:3px solid var(--accent); }
.ch-num { font-size:11px; color:var(--muted); min-width:22px; font-family:'Barlow Condensed',sans-serif; }
.ch-icon {
  width:36px; height:36px; border-radius:6px; background:var(--surface2);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:var(--accent2); flex-shrink:0;
  border:1px solid var(--border); text-align:center; line-height:1.2; padding:2px;
}
.ch-name { font-size:13px; font-weight:500; color:var(--text); }
.ch-cat { font-size:10px; color:var(--muted); margin-top:1px; }

/* ── Player area ── */
#content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#player-wrap { position:relative; background:#000; flex-shrink:0; }
#player { width:100%; aspect-ratio:16/9; }

/* JW overrides */
.jw-progress { background-color:#3b82f6 !important; }
.jw-text-live::before { background-color:var(--live) !important; }
.jw-controlbar { background:rgba(8,12,24,.95) !important; border-top:1px solid var(--border) !important; }
.jw-button-color { color:#94a3b8 !important; }
.jw-button-color:hover, :not(.jw-flag-touch) .jw-button-color:hover { color:#fff !important; }
.jw-reset-text { color:#fff !important; }

/* ── Now playing bar ── */
#now-playing {
  padding:14px 20px; background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:14px;
}
#np-icon {
  width:44px; height:44px; border-radius:8px; background:var(--surface2);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:var(--accent2);
  border:1px solid var(--border); text-align:center; padding:2px; flex-shrink:0;
}
#np-name { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; line-height:1; }
#np-meta { font-size:12px; color:var(--muted); margin-top:3px; }
.np-live { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; color:var(--live); text-transform:uppercase; letter-spacing:.08em; margin-left:10px; }
.np-live-dot { width:6px; height:6px; border-radius:50%; background:var(--live); animation:pulse 1.4s infinite; }

/* ── Status ── */
#status-bar {
  padding:6px 20px; font-size:11px; color:var(--muted);
  background:var(--bg); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  min-height:28px;
}
#status-bar .dot-loading { display:inline-block; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── Empty state ── */
#empty {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:var(--muted); gap:12px;
}
#empty .big-icon { font-size:52px; opacity:.3; }
#empty p { font-size:14px; }

/* ── iOS landscape ── */
.ios-landscape {
  transform:rotate(90deg); transform-origin:center center;
  width:100vh !important; height:100vw !important;
  position:fixed !important; top:0; left:0; background:#000; z-index:9999;
}

/* ── Responsive ── */
@media(max-width:640px){
  #sidebar { width:200px; }
  .cat-tabs { display:none; }
}
@media(max-width:480px){
  main { flex-direction:column; }
  #sidebar { width:100%; height:160px; flex-direction:row; border-right:none; border-bottom:1px solid var(--border); }
  #channel-list { display:flex; flex-direction:row; overflow-x:auto; overflow-y:hidden; }
  .ch-item { flex-direction:column; min-width:70px; text-align:center; padding:8px 6px; border-bottom:none; border-right:1px solid #0d1526; }
  .ch-num,.ch-cat { display:none; }
  .search-wrap,.cat-tabs { display:none; }
}
</style>
</head>

// ── Categorías ──────────────────────────────────────────────────────────────
var CATS = ["Todas","Deportes","Noticias","Abierta","Cine","Entretenimiento","Docs","Infantil","Lifestyle","Música","Internac."];
var activeCat = "Todas";
var activeSearch = "";
var currentCh = null;
var playerInst = null;

function abbrev(nombre) {
  var words = nombre.split(" ");
  if (words.length === 1) return nombre.substring(0,4).toUpperCase();
  return words.slice(0,2).map(function(w){ return w[0]; }).join("").toUpperCase();
}

// ── Render categorías ───────────────────────────────────────────────────────
function renderCats() {
  var wrap = document.getElementById("cat-tabs");
  wrap.innerHTML = "";
  CATS.forEach(function(c){
    var btn = document.createElement("button");
    btn.className = "cat-btn" + (c === activeCat ? " active" : "");
    btn.textContent = c;
    btn.onclick = function(){ activeCat = c; renderCats(); renderList(); };
    wrap.appendChild(btn);
  });
}

// ── Render lista ────────────────────────────────────────────────────────────
function renderList() {
  var list = document.getElementById("channel-list");
  list.innerHTML = "";
  var q = activeSearch.toLowerCase();
  var filtered = CANALES.filter(function(ch){
    var matchCat = activeCat === "Todas" || ch.cat === activeCat;
    var matchQ   = !q || ch.nombre.toLowerCase().includes(q) || ch.id.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  filtered.forEach(function(ch, i){
    var el = document.createElement("div");
    el.className = "ch-item" + (currentCh && currentCh.id === ch.id ? " active" : "");
    el.innerHTML =
      '<div class="ch-num">'+(i+1)+'</div>'+
      '<div class="ch-icon">'+abbrev(ch.nombre)+'</div>'+
      '<div><div class="ch-name">'+ch.nombre+'</div><div class="ch-cat">'+ch.cat+'</div></div>';
    el.onclick = function(){ sintonizar(ch); };
    list.appendChild(el);
  });
}

// ── Search ──────────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", function(){
  activeSearch = this.value;
  renderList();
});

// ── Sintonizar ──────────────────────────────────────────────────────────────
function sintonizar(ch) {
  currentCh = ch;
  renderList();

  // Update now playing
  var np = document.getElementById("now-playing");
  np.style.display = "flex";
  document.getElementById("np-icon").textContent = abbrev(ch.nombre);
  document.getElementById("np-name").textContent = ch.nombre;
  document.getElementById("empty").style.display = "none";

  setStatus('<span class="dot-loading">↻</span> Conectando con ' + ch.nombre + '…');

  var cdn  = rnd(CDN);
  var url  = PROXY + "https://" + cdn + ".gigared.com.ar/live/eds/" + ch.id + "/sa_live_dash/" + ch.id + ".mpd";

  var isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent);
  var isSmartTV = /SmartTV|Tizen|Web0S|SmartHub|Chromecast/i.test(navigator.userAgent);

  if (playerInst) {
    try { playerInst.remove(); } catch(e){}
    playerInst = null;
  }
  document.getElementById("player").innerHTML = "";

  jwplayer("player").setup({
    playlist: [{
      title: ch.nombre,
      description: "EN VIVO",
      sources: [{
        file: url,
        drm: { clearkey: { keyId: ch.k1, key: ch.k2 } }
      }]
    }],
    autostart: true,
    mute: false,
    volume: 100,
    width: "100%",
    height: "100%",
    stretching: "exactfit",
    aspectratio: "16:9",
    preload: "auto",
    liveSyncDuration: 3,
    live: { dvrSeekLimit: 3600, edgeMargin: 5 },
    dash: { bufferLength: 1, maxBufferLength: 1 }
  });

  playerInst = jwplayer("player");

  playerInst.on("play", function(){
    setStatus("▶ Reproduciendo · " + ch.nombre + " · " + cdn.toUpperCase());
    try { playerInst.setCurrentAudioTrack(1); } catch(e){}
  });
  playerInst.on("error", function(e){
    setStatus("✕ Error al cargar " + ch.nombre + ". Intentá otro canal.");
    console.error(e);
  });
  playerInst.on("buffer", function(){
    setStatus('<span class="dot-loading">↻</span> Cargando buffer…');
    try { playerInst.setCurrentQuality(0); } catch(e){}
  });

  playerInst.on("fullscreen", function(e){
    var cont = document.getElementById("player");
    if (!isIOS && screen.orientation) {
      if (e.fullscreen) {
        (async function t(){ try { await screen.orientation.lock("landscape"); } catch(err){ setTimeout(t,200); } })();
      } else { try { screen.orientation.unlock(); } catch(err){} }
    }
    if (isIOS) {
      if (e.fullscreen) cont.classList.add("ios-landscape");
      else cont.classList.remove("ios-landscape");
    }
  });
}

function setStatus(html){
  document.getElementById("status-bar").innerHTML = html;
}

// ── Init ────────────────────────────────────────────────────────────────────
renderCats();
renderList();
</script>
