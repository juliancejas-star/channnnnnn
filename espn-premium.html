<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <title>ESPN Premium</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #05081c; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
    #player { width: 100%; max-width: 960px; }
    .jw-progress { background-color: #e8000d !important; }
    .jw-text-live::before { background-color: red !important; }
    .jw-reset-text { color: white !important; }
    .jw-controlbar { background-color: #05081c !important; border-top: 1px solid #333; }
    .jw-button-color { color: #ccc !important; }
    .jw-button-color:hover { color: #fff !important; }
    .ios-landscape {
      transform: rotate(90deg);
      transform-origin: center center;
      width: 100vh !important;
      height: 100vw !important;
      position: fixed !important;
      top: 0; left: 0;
      background: #000;
      z-index: 9999;
    }
  </style>
</head>
<body>

<div id="player"></div>

<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";</script>

<script>
  var CDN    = ["cdn02", "cdn03"];
  var PROXY  = "https://cors-proxy.wangzhishi.net/";
  var cdn    = CDN[Math.floor(Math.random() * CDN.length)];
  var STREAM = "https://" + cdn + ".gigared.com.ar/live/eds/ESPN_Premium/sa_live_dash/ESPN_Premium.mpd";
  var KEY_ID = "dca96877c202470bdad9839bea525c0a";
  var KEY    = "d651871131d4b26f0095bcb9771b8f2f";

  var isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent);
  var isSmartTV = /SmartTV|Tizen|Web0S|SmartHub|Chromecast/i.test(navigator.userAgent);

  jwplayer("player").setup({
    playlist: [{
      title: "ESPN Premium",
      description: "EN VIVO",
      sources: [{
        file: PROXY + STREAM,
        drm: { clearkey: { keyId: KEY_ID, key: KEY } }
      }]
    }],
    autostart: true,
    mute: false,
    volume: 100,
    width: "100%",
    height: "100%",
    stretching: "exactfit",
    aspectratio: "16:9",
    preload: "auto",
    liveSyncDuration: 3,
    live: { dvrSeekLimit: 3600, edgeMargin: 5 },
    dash: { bufferLength: 1, maxBufferLength: 1 }
  });

  var player = jwplayer("player");

  player.on("play", function() {
    try { player.setCurrentAudioTrack(1); } catch(e) {}
  });

  if (isSmartTV) {
    player.on("ready", function() {
      var video = document.querySelector("#player video");
      if (video) { video.muted = false; try { video.volume = 1.0; } catch(e){} }
    });
  }

  player.on("fullscreen", function(e) {
    var contenedor = document.getElementById("player");
    if (!isIOS && screen.orientation) {
      if (e.fullscreen) {
        (async function tryLock() {
          try { await screen.orientation.lock("landscape"); }
          catch(err) { setTimeout(tryLock, 200); }
        })();
      } else {
        try { screen.orientation.unlock(); } catch(err) {}
      }
    }
    if (isIOS) {
      if (e.fullscreen) contenedor.classList.add("ios-landscape");
      else contenedor.classList.remove("ios-landscape");
    }
  });

  player.on("buffer", function() {
    try { player.setCurrentQuality(0); } catch(e) {}
  });

  player.on("ready", function() {
    var lat = player.getLiveLatency ? player.getLiveLatency() : "N/A";
    console.log("Latencia DVR:", lat, "s");
  });
</script>

</body>
</html>
